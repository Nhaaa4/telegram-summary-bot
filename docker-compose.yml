services:
  bot:
    build: .
    env_file:
      - .env
    restart: unless-stopped

  postgres:
    image: postgres:16
    profiles:
      - local-db
    environment:
      POSTGRES_DB: summary_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
